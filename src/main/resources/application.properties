spring.application.name=easyeval
server.port=8081

# 有道云作文批改 API 配置
# 这里应该填你的有道云 app-key
youdao.api.app-key=
# 这里应该填你的有道云 app-secret
youdao.api.app-secret=
# 这里应该填有道云作文批改接口地址
youdao.api.url=

# 微信公众号配置
# 这里应该填你的测试号或服务号 app-id
wx.mp.app-id=
# 这里应该填你的测试号或服务号 app-secret
wx.mp.secret=
# 这里应该填你在微信后台配置的 token
wx.mp.token=

# MySQL 数据库配置
# 这里应该填你的 MySQL 连接地址
spring.datasource.url=
# 这里应该填你的 MySQL 用户名
spring.datasource.username=
# 这里应该填你的 MySQL 密码
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Redis 配置
# 这里应该填你的 Redis 主机地址
spring.redis.host=
# 这里应该填你的 Redis 端口
spring.redis.port=
# 这里应该填你的 Redis 用户名，没有可留空
spring.redis.username=
# 这里应该填你的 Redis 密码，没有可留空
spring.redis.password=
# 这里应该填你的 Redis 数据库编号
spring.redis.database=
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0
spring.redis.jedis.pool.max-wait=-1ms

# RocketMQ 5.x（腾讯云）配置
# 这里应该填是否启用 RocketMQ（true / false）
rocketmq5.enabled=
# 这里应该填 RocketMQ 接入点，例如 rmq-xxxxxx.rocketmq.gz.public.tencenttdmq.com:8080
rocketmq5.endpoints=
# 这里应该填 RocketMQ AccessKey
rocketmq5.access-key=
# 这里应该填 RocketMQ SecretKey
rocketmq5.secret-key=
# 这里应该填 RocketMQ namespace
rocketmq5.namespace=
# 这里应该填 RocketMQ topic
rocketmq5.topic=
# 这里应该填 RocketMQ tag
rocketmq5.tag=
# 这里应该填 RocketMQ consumer group
rocketmq5.consumer-group=

# 管理端安全配置
# 这里应该填允许访问管理端的 IP 白名单，多个用英文逗号分隔
admin.security.allowed-ips=